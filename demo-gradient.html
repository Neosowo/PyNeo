<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoPY - Fondo Premium Cyberpunk</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(180deg,
                    #7B2CFF 0%,
                    #5A189A 35%,
                    #3A0CA3 65%,
                    #000000 100%);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Resplandor atmosférico superior */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at top center,
                    rgba(123, 44, 255, 0.4) 0%,
                    rgba(90, 24, 154, 0.2) 30%,
                    transparent 70%);
            pointer-events: none;
        }

        /* Logo blanco centrado */
        .logo-container {
            position: relative;
            z-index: 10;
            text-align: center;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .logo {
            font-size: 120px;
            font-weight: 900;
            letter-spacing: -5px;
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.3);
            margin-bottom: 20px;
        }

        .tagline {
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 8px;
            text-transform: uppercase;
            opacity: 0.9;
        }

        /* Paleta de colores en la esquina */
        .color-palette {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(123, 44, 255, 0.3);
        }

        .color-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            color: white;
            font-family: monospace;
            font-size: 12px;
        }

        .color-box {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            margin-right: 10px;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .color-item:last-child {
            margin-bottom: 0;
        }
    </style>
</head>

<body>
    <div class="logo-container">
        <div class="logo">NeoPY</div>
        <div class="tagline">Aprende Python</div>
    </div>

    <div class="color-palette">
        <div class="color-item">
            <div class="color-box" style="background: #7B2CFF;"></div>
            <span>#7B2CFF - Violeta Eléctrico</span>
        </div>
        <div class="color-item">
            <div class="color-box" style="background: #5A189A;"></div>
            <span>#5A189A - Púrpura Profundo</span>
        </div>
        <div class="color-item">
            <div class="color-box" style="background: #3A0CA3;"></div>
            <span>#3A0CA3 - Índigo Oscuro</span>
        </div>
        <div class="color-item">
            <div class="color-box" style="background: #000000;"></div>
            <span>#000000 - Negro Absoluto</span>
        </div>
    </div>
</body>

</html>
